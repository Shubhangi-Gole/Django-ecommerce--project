<!DOCTYPE html>
<html>
<head>
    <title>Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<form method="GET" class="mb-4">
    <input
        type="text"
        name="q"
        placeholder="Search products..."
        class="form-control"
    >
</form>

<div class="container mt-4">

    <a href="{% url 'cart' %}" class="btn btn-success mb-3">
        View Cart
    </a>
    <a href="{% url 'logout' %}" class="btn btn-danger mb-3">
        Logout
    </a>

    <h1 class="text-center mb-4">My Store</h1>

    <form method="GET" class="mb-4">
    <input
        type="text"
        name="q"
        class="form-control"
        placeholder="Search products..."
    >
    </form>

    <div class="row">

        {% for product in products %}
        <div class="col-md-4">

            <div class="card mb-4">

                {% if product.image %}
                <img src="{{ product.image.url }}"
                     class="card-img-top"
                     style="height: 200px; object-fit: contain; background-color: #f8f9fa;">
                {% endif %}

                <div class="card-body">

                    <h5 class="card-title">
                        <a href="{% url 'product_detail' product.id %}">
                            {{ product.name }}
                        </a>
                    </h5>

                    <p class="card-text">
                        ₹{{ product.price }}
                    </p>

                    <p>
                        {{ product.description }}
                    </p>

                    <a href="{% url 'add_to_cart' product.id %}"
                       class="btn btn-primary">
                        Add to Cart
                    </a>



                </div>

            </div>

        </div>
        {% endfor %}


    </div>

</div>

</body>
</html>
